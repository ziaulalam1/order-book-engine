name: Engine invariants

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run invariant tests
        run: node --test test/engine.test.mjs
